server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway
  main:
    banner-mode: off
    web-application-type: reactive

  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 10s

      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                  - "http://localhost:4173"
                  - "http://localhost:3000"
                  - "http://192.168.100.6:5173"
                  - "http://192.168.100.6:4173"
                  - "http://192.168.100.6:3000"
                  - "http://192.168.100.1:5173"
                  - "http://192.168.100.2:5173"
                  - "http://192.168.100.3:5173"
                  - "http://192.168.100.4:5173"
                  - "http://192.168.100.5:5173"
                  - "http://192.168.100.7:5173"
                  - "http://192.168.100.8:5173"
                  - "http://192.168.100.9:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600

          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: authServiceCB
                    fallbackUri: forward:/fallback/auth

            - id: auth-service-sessions
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/sessions/**

            - id: auth-service-actuator
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/actuator/**
              filters:
                - RewritePath=/api/actuator/(?<segment>.*), /api/actuator/${segment}

            - id: auth-service-swagger
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/auth/swagger-ui/**, /api/v1/auth/v3/api-docs/**
              filters:
                - RewritePath=/api/v1/auth/(?<segment>.*), /$\{segment}

            - id: core-service
              uri: lb://CORE-SERVICE
              predicates:
                - Path=/api/v1/clients/**, /api/v1/exercises/**, /api/v1/templates/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: coreServiceCB
                    fallbackUri: forward:/fallback/core

            - id: core-service-swagger
              uri: lb://CORE-SERVICE
              predicates:
                - Path=/api/v1/clients/swagger-ui/**, /api/v1/clients/v3/api-docs/**
              filters:
                - RewritePath=/api/v1/clients/(?<segment>.*), /$\{segment}

            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/api/v1/notifications/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: notificationServiceCB
                    fallbackUri: forward:/fallback/notification

          default-filters:
            - PreserveHostHeader

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://eureka:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:WARN}
    com.coachkit.gateway: ${LOGGING_LEVEL_APP:DEBUG}
    io.netty: ERROR
    org.springframework.cloud.gateway: INFO
  pattern:
    console: "%d{HH:mm:ss} %-5level %msg%n"

# Resilience4j Circuit Breaker и TimeLimiter конфигурация
resilience4j:
  timelimiter:
    configs:
      default:
        timeoutDuration: 10s
        cancelRunningFuture: true
    instances:
      authServiceCB:
        baseConfig: default
      coreServiceCB:
        baseConfig: default
      notificationServiceCB:
        baseConfig: default
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        slowCallDurationThreshold: 5s
        slowCallRateThreshold: 50
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      authServiceCB:
        baseConfig: default
      coreServiceCB:
        baseConfig: default
      notificationServiceCB:
        baseConfig: default
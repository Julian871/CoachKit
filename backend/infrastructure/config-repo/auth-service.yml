server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: auth
        hbm2ddl.auto: none
        temp.use_jdbc_metadata_defaults: true
        jdbc.lob.non_contextual_creation: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  flyway:
    enabled: true
    default-schema: auth
    schemas: auth

  data:
    redis:
      host: redis
      port: 6379

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Custom properties for auth service
coachkit:
  auth:
    jwt:
      secret: ${JWT_SECRET}  # No default! Must be set in .env
      access-token-ttl: 15m
      refresh-token-ttl: 7d

    cookie:
      refresh-name: refresh_token
      http-only: true
      secure: false
      same-site: Strict
      path: /api/v1/auth
      max-age-days: 7

    verification:
      code-length: 6
      ttl-minutes: 15

    password-reset:
      ttl-minutes: 60

logging:
  level:
    com.coachkit.auth: DEBUG

# Swagger/OpenAPI configuration
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
  packages-to-scan: com.coachkit.auth.controller
  paths-to-match: /api/**
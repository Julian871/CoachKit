server:
  port: 8080

spring:
  application:
    name: gateway

  config:
    import: "optional:configserver:http://config-server:8888"

  cloud:
    config:
      fail-fast: true
      retry:
        initial-interval: 1000
        max-attempts: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: gateway

logging:
  level:
    com.coachkit.gateway: DEBUG
    org.springframework.cloud.gateway: INFO